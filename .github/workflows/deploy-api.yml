name: 🚀 Deploy API - Batidos Pitaya

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout código
      uses: actions/checkout@v4
      
    - name: 🔑 Configurar SSH
      uses: webfactory/ssh-agent@v0.8.0
      with:
        ssh-private-key: ${{ secrets.HOSTINGER_SSH_KEY }}
        
    - name: 📤 Sincronizar archivos (rsync)
      run: |
        echo "🔄 Sincronizando repositorio..."
        
        rsync -avz \
          --delete \
          --exclude='.git/' \
          --exclude='.github/' \
          --exclude='.scripts/' \
          --exclude='.agent/' \
          --exclude='.gitignore' \
          --exclude='api/uploads/' \
          -e "ssh -o StrictHostKeyChecking=no -p 65002" \
          ./ \
          ${{ secrets.HOSTINGER_USER }}@${{ secrets.HOSTINGER_HOST }}:${{ secrets.HOSTINGER_PATH_API }}/
          
    - name: 🔧 Configurar permisos
      run: |
        echo "🔧 Configurando permisos en el servidor..."
        
        ssh -o StrictHostKeyChecking=no -p 65002 ${{ secrets.HOSTINGER_USER }}@${{ secrets.HOSTINGER_HOST }} << 'EOF'
          cd ${{ secrets.HOSTINGER_PATH_API }}
          find api core docs -type d -exec chmod 755 {} \;
          find api core docs -type f -exec chmod 644 {} \;
          chmod -R 777 api/uploads/ || true
        EOF
        
    - name: ✅ Verificar deploy
      run: |
        echo "✅ Deploy completado exitosamente"
        echo "📁 Carpeta sincronizada: api/, core/, docs/"
        echo "📁 Carpeta excluida: api/uploads/"
        echo "🌐 Sitio: https://api.batidospitaya.com"
        echo "🖥️ Servidor: ${{ secrets.HOSTINGER_HOST }}:65002"
