name: рЯУ¶ Receive PitayaCore Sync

on:
  repository_dispatch:
    types: [ pitayacore-sync ]

jobs:
  sync-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: рЯУ• Checkout subdominio
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.SYNC_TOKEN }}
          fetch-depth: 0

      - name: рЯУ• Checkout PitayaCore en SHA espec√≠fico
        uses: actions/checkout@v4
        with:
          repository: MiguelGotea/PitayaCore
          token: ${{ secrets.SYNC_TOKEN }}
          
          path: _pitayacore

      - name: ?? Verificaciуn de Versiуn (Debug)
        run: |
          echo '?? Fecha: '03/29/2026 11:29:39
          echo '?? Џltimo commit recibido de PitayaCore:'
          git -C _pitayacore log -1 --oneline

      - name: рЯФД Actualizar las 3 carpetas desde PitayaCore
        run: |
          rsync -av --delete _pitayacore/core/   ./core/
          rsync -av --delete _pitayacore/docs/   ./docs/
          rsync -av --delete _pitayacore/.agent/ ./.agent/
          rm -rf _pitayacore

      - name: рЯТЊ Commit y push si hay cambios reales
        run: |
          git config user.name "PitayaCore Bot"
          git config user.email "bot@batidospitaya.com"
          git add core/ docs/ .agent/

          if git diff --staged --quiet; then
            echo "вДєпЄП Sin cambios nuevos que commitear"
          else
            git commit -m "chore(core): sync from PitayaCore@${{ github.event.client_payload.sha }}"
            git push
            echo "вЬЕ 3 carpetas sincronizadas en el repo"
          fi

      - name: рЯФС Configurar SSH para deploy al host
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.HOSTINGER_SSH_KEY }}

      - name: рЯУ§ Deploy core/ вЖТ HOST (SOLO core/, nunca docs/ ni .agent/)
        run: |
          echo "рЯУ§ Deploying core/ to ${{ secrets.HOSTINGER_PATH_API }}/core/"

          rsync -avz --delete \
            -e "ssh -o StrictHostKeyChecking=no -p 65002" \
            ./core/ \
            ${{ secrets.HOSTINGER_USER }}@${{ secrets.HOSTINGER_HOST }}:${{ secrets.HOSTINGER_PATH_API }}/core/

      - name: вЬЕ Verificar deploy
        run: |
          echo "вЬЕ core/ deployado exitosamente al host"
          echo "рЯУБ docs/ y .agent/ solo en GitHub, no en host"
          echo "рЯМР Repositorio: ${{ github.repository }}"
